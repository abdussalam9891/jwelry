<div
  id="authModal"
  class="fixed inset-0 hidden bg-black/40 backdrop-blur-sm z-[9999] items-center justify-center p-4"
>
  <div class="w-full max-w-[420px] bg-white rounded-3xl p-8 relative shadow-xl">
    <button
      id="closeModal"
      class="absolute top-4 right-4 w-8 h-8 rounded-full hover:bg-gray-100"
    >
      ✕
    </button>

    <img src="src/assets/icon/logo.png" class="w-[100px] mx-auto mb-6" />

    <h2 class="text-xl font-semibold text-center text-[#6B1A2A]">
      Welcome to Gemora
    </h2>

    <p class="text-sm text-gray-500 text-center mt-2 mb-6">
      Continue your shopping journey
    </p>

    <!-- google -->
    <button
      id="google-btn"
      class="w-full border border-gray-200 rounded-xl py-3 flex items-center justify-center gap-3 mb-4"
    >
      <img src="src/assets/icon/google.svg" class="w-5 h-5" />
      <span class="text-sm font-medium"> Continue with Google </span>
    </button>

    <!-- otp -->
    <input
      id="phoneInput"
      type="tel"
      placeholder="Enter mobile number"
      class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none mb-4"
    />

    <div id="otpSection" class="hidden">
      <input
        id="otpInput"
        type="tel"
        placeholder="Enter OTP"
        class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none mb-4"
      />
    </div>

    <button
      id="requestOtpBtn"
      class="w-full bg-[#6B1A2A] text-white py-3 rounded-xl"
    >
      Request OTP
    </button>

    <button
      id="verifyOtpBtn"
      class="hidden w-full mt-4 bg-[#6B1A2A] text-white py-3 rounded-xl"
    >
      Verify OTP
    </button>

    <div class="flex items-center gap-3 my-5">
      <div class="h-px flex-1 bg-gray-200"></div>
      <span class="text-xs text-gray-400">or</span>
      <div class="h-px flex-1 bg-gray-200"></div>
    </div>

    <div class="mt-5 text-center">
      <a
        href="/pages/login.html"
        class="text-sm font-medium text-[#6B1A2A] hover:underline"
      >
        Sign In
      </a>

      <span class="mx-2 text-gray-300">•</span>

      <a
        href="/pages/register.html"
        class="text-sm text-gray-500 hover:text-[#6B1A2A] transition"
      >
        Create account
      </a>
    </div>
  </div>

  <div
    id="toast"
    class="hidden fixed top-5 right-5 bg-white text-[#6B1A2A] px-4 py-3 rounded-xl shadow-xl border border-[#EADBC8]"
  ></div>
</div>
