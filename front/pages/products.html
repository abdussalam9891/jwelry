    <link href="../src/css/main.css" rel="stylesheet" />
    <link rel="stylesheet" href="../src/css/navbar.css" />

  </head>
  <body>
    <div id="navbar-container"></div>

<div class="page-content">

  <section
  class="
    container-main
    py-6
    md:py-8
  "
>

    <div id="collectionHeader"></div>

  </section>

  <section class="container-main pb-4">

  <div id="collectionBanner"></div>

</section>

  <section
    class="
      sticky
      top-[40px]
      z-30
      bg-white
      backdrop-blur-md
      border-y

    <div class="container-main">

      <div id="filterBar"></div>

<div id="filterDropdowns"></div>

    </div>
  </section>

    <div id="activeFilters"></div>



   <div

  class="
    grid

    gap-y-14

></div>

<div
  id="productsGrid"
  class="..."
>
</div>

    <div id="pagination"></div>

  id="filterOverlay"
  class="
    fixed
    inset-0
    bg-black/30
    backdrop-blur-sm
    hidden
    z-40
  "
></div>

<div
  id="mobileFilters"
  class="
    fixed
    top-0
    right-0
    h-full
    w-[90%]
    max-w-md

    bg-white

    shadow-2xl

    transition-transform
    duration-300

    translate-x-full

    z-50
  "
>

<button
  id="openFilters"
  class="
    lg:hidden

    fixed
    bottom-6
    left-1/2
    -translate-x-1/2

    h-12
    px-6

    rounded-full

    bg-black

    shadow-xl

    z-40

>
  Filters
</button>

</div>

    <!-- footer  -->
    <div id="footer-container"></div>

    <script type="module" src="../src/js/main.js"></script>
