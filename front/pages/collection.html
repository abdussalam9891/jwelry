<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="../src/css/main.css" rel="stylesheet" />
    <link rel="stylesheet" href="../src/css/navbar.css" />
    <link rel="stylesheet" href="../src/css/animations.css" />
  </head>
  <body>
    <div id="navbar-container"></div>



 <main>

  <!-- HERO -->

<section
  id="collectionHero"
  class="
    relative
    min-h-[80vh]
    overflow-hidden
    mt-24
  "
>

  <!-- Background -->
  <img
    id="heroImage"
    class="
      absolute
      inset-0
      w-full
      h-full
      object-cover
      scale-105
    "
  />

  <!-- Luxury Overlay -->
  <div
    class="
      absolute
      inset-0
      bg-gradient-to-r
      from-black/70
      via-black/35
      to-black/10
    "
  ></div>

  <!-- Content -->
  <div
    class="
      container-main
      relative
      z-10
      h-[85vh]
      flex
      items-center
    "
  >

    <div class="max-w-3xl">



      <!-- Title -->
      <h1
        id="heroTitle"
        class="
          text-5xl
          md:text-7xl
          xl:text-8xl
          font-light
          text-white
          leading-[0.95]
          mb-8
        "
      >
      </h1>

      <!-- Description -->
      <p
        id="heroDescription"
        class="
          text-lg
          md:text-xl
          leading-relaxed
          text-white/80
          max-w-2xl
          mb-10
        "
      >
      </p>

      <!-- CTA -->
      <div class="flex flex-wrap gap-4">

        <a
          href="#productsSection"
          class="
            px-8
            py-4
            bg-white
            text-black
            rounded-full
            font-medium
            hover:scale-[1.02]
            transition
          "
        >
          Explore Collection
        </a>

        <a
          href="/pages/products.html"
          class="
            px-8
            py-4
            border
            border-white/30
            rounded-full
            text-white
            backdrop-blur-md
            hover:bg-white/10
            transition
          "
        >
          View All Jewellery
        </a>

      </div>

    </div>

  </div>

  <!-- Premium Floating Stats -->
  <div
  class="
    absolute
    bottom-8
    left-1/2
    -translate-x-1/2
    w-[92%]
    max-w-6xl
    hidden
    lg:block
  "
>


    <!-- BOTTOM STRIP -->
      <div
        class="absolute bottom-0 left-0 w-full border-t border-white/10 bg-black/30 backdrop-blur-md"
      >
        <div
          class="container-main grid grid-cols-2 md:grid-cols-4 divide-y md:divide-y-0 md:divide-x divide-white/10"
        >
          <div class="py-2 md:py-3 text-center">
            <p
              class="text-[11px] sm:text-xs md:text-sm text-white/90 font-light leading-tight"
            >
              Certified Jewellery
            </p>
          </div>

          <div class="py-2 md:py-3 text-center">
            <p
              class="text-[11px] sm:text-xs md:text-sm text-white/90 font-light leading-tight"
            >
              Lifetime Warranty
            </p>
          </div>

          <div class="py-2 md:py-3 text-center">
            <p
              class="text-[11px] sm:text-xs md:text-sm text-white/90 font-light leading-tight"
            >
              Insured Shipping
            </p>
          </div>

          <div class="py-2 md:py-3 text-center">
            <p
              class="text-[11px] sm:text-xs md:text-sm text-white/90 font-light leading-tight"
            >
              Easy Returns
            </p>
          </div>
        </div>
      </div>






  
</div>

</section>

  <!-- PRODUCTS -->

  <section class="py-24">

    <div class="container-main">

      <div
        class="flex justify-between items-center mb-12"
      >

        <h2
          class="text-3xl font-light"
          id="productsHeading"
        >
        </h2>

        <select
          id="sortSelect"
          class="border-b border-black/20 bg-transparent"
        >
          <option value="">
            Sort By
          </option>

          <option value="price_asc">
            Price Low → High
          </option>

          <option value="price_desc">
            Price High → Low
          </option>

          <option value="newest">
            Newest
          </option>

        </select>

      </div>

      <div
        id="productsGrid"
        class="grid grid-cols-2 lg:grid-cols-4 gap-8"
      ></div>

    </div>

  </section>

</main>










    <!-- footer  -->
    <div id="footer-container"></div>

    <script type="module" src="../src/js/main.js"></script>
    <script type="module" src="../src/js/pages/collectionPage.js"></script>

    <script src="../src/js/components/footer.js"></script>
  </body>
</html>
