<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="../src/css/main.css" rel="stylesheet" />
    <link rel="stylesheet" href="../src/css/navbar.css" />
    <link rel="stylesheet" href="../src/css/animations.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <div id="navbar-container"></div>

    <!-- MAIN PRODUCT SECTION -->
    <main class="container-main py-32">
      <!-- product  -->
      <div id="productContainer"></div>

      <div class="mt-12">
        <h2 class="text-lg font-semibold mb-4">Similar Products</h2>
        <div id="similarSection"></div>
      </div>

      <div class="mt-12">
        <h2 class="text-lg font-semibold mb-4">You may also like</h2>
        <div id="recommendSection"></div>
      </div>
    </main>

    <div
      id="reviewModal"
      class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center"
    >
      <div class="bg-white rounded-xl p-6 w-full max-w-md">
        <h3 class="text-lg font-semibold mb-4">Write Review</h3>

        <select id="reviewRating" class="w-full border p-2 rounded mb-3">
          <option value="">Select Rating</option>

          <option value="5">5 Stars</option>

          <option value="4">4 Stars</option>

          <option value="3">3 Stars</option>

          <option value="2">2 Stars</option>

          <option value="1">1 Star</option>
        </select>

        <textarea
          id="reviewComment"
          rows="4"
          class="w-full border rounded p-2 mb-3"
          placeholder="Write your review..."
        ></textarea>

        <input
          type="file"
          id="reviewImages"
          multiple
          accept="image/*"
          class="mb-4"
        />

        <div class="flex justify-end gap-2">
          <button id="closeReviewModal" class="border px-4 py-2 rounded">
            Cancel
          </button>

          <button
            id="submitReviewBtn"
            class="bg-[#6B1A2A] text-white px-4 py-2 rounded"
          >
            Submit
          </button>
        </div>
      </div>
    </div>

    <div
  id="deleteReviewModal"
  class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center"
>
  <div class="bg-white rounded-xl p-6 w-full max-w-md">

    <h3 class="text-lg font-semibold">
      Delete Review
    </h3>

    <p class="mt-2 text-sm text-black/60">
      Are you sure you want to delete this review?
      This action cannot be undone.
    </p>

    <div class="mt-6 flex justify-end gap-2">

      <button
        id="cancelDeleteReview"
        class="border px-4 py-2 rounded"
      >
        Cancel
      </button>

      <button
        id="confirmDeleteReview"
        class="bg-red-600 text-white px-4 py-2 rounded"
      >
        Delete
      </button>

    </div>

  </div>
</div>

    <!-- FOOTER -->
    <div id="footer-container"></div>

    <noscript>
      <p class="p-4 text-center text-red-500">
        Please enable JavaScript to view this page.
      </p>
    </noscript>

    <script type="module" src="../src/js/main.js"></script>
    <script type="module" src="../src/js/pages/productDetails.js"></script>
    <script src="../src/js/components/footer.js"></script>
  </body>
</html>
