<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="/front/src/css/main.css" rel="stylesheet" />
    <link rel="stylesheet" href="/front/src/css/navbar.css" />
    <link rel="stylesheet" href="/front/src/css/animations.css" />
  </head>





<body>
  <div id="navbar-container"></div>

<main class="container-main section page-content my-12 py-28">

  <!-- HEADER -->
  <div class="mb-8">
    <h1 class="text-2xl md:text-3xl font-semibold">
      My Wishlist
      <span id="wishlistCountText" class="text-black/60 text-lg font-normal ml-2">
        0 items
      </span>
    </h1>
  </div>

  <!-- GRID -->
  <div id="wishlistGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

</main>


<div id="variantModal" class="fixed inset-0 bg-black/40 hidden flex items-center justify-center z-50">

  <div class="bg-white p-5 rounded-lg w-[90%] max-w-md">

    <h2 class="text-lg font-semibold mb-4">Select Options</h2>

    <div id="variantOptions"></div>

      <p id="variantError" class="text-red-500 text-sm hidden">
  Please select all options
</p>

    <button
      id="confirmMoveToCart"
      class="w-full mt-4 bg-black text-white py-2 rounded"
    >
      Move to Cart
    </button>

  </div>




</div>


<div id="toast"
  class="hidden fixed bottom-5 right-5 bg-black text-white px-4 py-2 rounded-lg shadow-lg z-50">
</div>





  <div id="footer-container"></div>

  <noscript>
    <p class="p-4 text-center text-red-500">
      Please enable JavaScript to view your wishlist.
    </p>
  </noscript>
 
  <script src="/front/src/js/main.js"></script>
  <script type="module" src="/front/src/js/components/navbar.js"></script>
  <script type="module" src="/front/src/js/pages/wishlistPage.js"></script>
  <script src="/front/src/js/components/footer.js"></script>

  </body>
</html>
