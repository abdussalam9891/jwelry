<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="/front/src/css/main.css" rel="stylesheet" />
    <link rel="stylesheet" href="/front/src/css/navbar.css" />
    <link rel="stylesheet" href="../src/css/animations.css" />
  </head>
  <body>
    <div id="navbar-container"></div>


 <section class="bg-[#F9F6F2] py-24">
  <div class="container-main max-w-2xl">

    <h1 class="text-[2.4rem] md:text-[2.8rem] font-light mb-6">
      Contact Us
    </h1>

    <p class="text-[1rem] text-black/60 mb-12">
      We're here to help with anything—from product queries to order support.
    </p>

    <!-- Info -->
    <div class="mb-10 space-y-3">
      <p class="text-[1rem]">
        Email: <span class="text-[#6B1A2A]">support@gemora.com</span>
      </p>
      <p class="text-[1rem]">
        Phone: <span class="text-black/70">+91 98765 43210</span>
      </p>
    </div>

    <!-- Optional Form -->
    <div class="space-y-5">

      <input type="text" placeholder="Your Name"
        class="w-full border border-black/10 px-4 py-3 bg-transparent focus:outline-none"/>

      <input type="email" placeholder="Email Address"
        class="w-full border border-black/10 px-4 py-3 bg-transparent focus:outline-none"/>

      <textarea placeholder="Your Message"
        class="w-full border border-black/10 px-4 py-3 h-32 bg-transparent focus:outline-none"></textarea>

      <button
        class="px-6 py-3 border border-[#6B1A2A] text-[#6B1A2A] hover:bg-[#6B1A2A] hover:text-white transition">
        Send Message
      </button>

    </div>

  </div>
</section>












      <!-- footer  -->
<div id="footer-container"></div>


   <script type="module" src="/front/src/js/main.js"></script>
    <script src="/front/src/js/components/footer.js"></script>
  </body>
</html>
