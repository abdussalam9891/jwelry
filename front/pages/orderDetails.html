<!doctype html>
<html>

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    href="/front/src/css/main.css"
    rel="stylesheet"
  />

  <title>My Orders</title>

</head>

<body class="bg-[#FAFAFA] text-[#111]">

  <!-- HEADER -->
  <header class="sticky top-0 z-40 bg-white border-b border-black/5">

    <div
      class="
        max-w-6xl
        mx-auto
        h-16
        px-4
        flex
        items-center
        justify-between
      "
    >

      <!-- LEFT -->
      <div class="flex items-center gap-5">

        <!-- LOGO -->
        <a
          href="/front/index.html"
          class="shrink-0"
        >

          <img
            src="/front/src/assets/icon/logo.png"
            alt="Gemora"
            class="h-10 w-auto"
          />

        </a>

        <!-- BACK -->
        <a
          href="/front/index.html"
          class="
            hidden
            sm:flex
            items-center
            gap-2
            text-sm
            text-black/70
            hover:text-[#6B1A2A]
            transition
          "
        >

          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.8"
            stroke="currentColor"
            class="w-4 h-4"
          >

            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"
            />

          </svg>

          <span>
            Continue Shopping
          </span>

        </a>

      </div>

    </div>

  </header>



 <!-- MAIN -->
<main
  class="
    max-w-6xl
    mx-auto
    px-4
    py-10
  "
>

  <!-- PAGE TITLE -->
  <div
    class="
      flex
      flex-col
      gap-3
      mb-8
    "
  >

    <p
      class="
        text-sm
        text-black/45
      "
    >
      Order Details
    </p>

    <div
      class="
        flex
        flex-col
        md:flex-row
        md:items-center
        md:justify-between
        gap-4
      "
    >

      <!-- LEFT -->
      <div>

        <h1
          class="
            text-3xl
            font-semibold
            tracking-tight
          "
        >
          Order Summary
        </h1>

        <p
          id="orderDate"
          class="
            text-sm
            text-black/50
            mt-2
          "
        >
          --
        </p>

      </div>

      <!-- STATUS -->
      <div
        id="orderStatus"
        class="
          w-fit
          px-4
          py-2
          rounded-full
          bg-[#F8EEF1]
          border
          border-[#E8D7DC]
          text-[#6B1A2A]
          text-sm
          font-semibold
        "
      >
        Confirmed
      </div>

    </div>

  </div>



  <!-- GRID -->
  <div
    class="
      grid
      grid-cols-1
      lg:grid-cols-[1fr_360px]
      gap-6
    "
  >

    <!-- LEFT -->
    <div class="space-y-6">

      <!-- ITEMS -->
      <section
        class="
          bg-white
          border
          border-black/5
          rounded-3xl
          p-6
        "
      >

        <div
          class="
            flex
            items-center
            justify-between
            mb-6
          "
        >

          <h2
            class="
              text-xl
              font-semibold
            "
          >
            Ordered Items
          </h2>

          <p
            id="itemCount"
            class="
              text-sm
              text-black/45
            "
          >
            --
          </p>

        </div>

        <!-- ITEMS CONTAINER -->
        <div
          id="orderItemsContainer"
          class="space-y-5"
        ></div>

      </section>



      <!-- SHIPPING -->
      <section
        class="
          bg-white
          border
          border-black/5
          rounded-3xl
          p-6
        "
      >

        <h2
          class="
            text-xl
            font-semibold
            mb-5
          "
        >
          Shipping Address
        </h2>

        <div
          id="shippingAddress"
          class="
            text-sm
            leading-7
            text-black/70
          "
        ></div>

      </section>

    </div>



    <!-- RIGHT -->
    <div class="space-y-6">

      <!-- PRICE SUMMARY -->
      <section
        class="
          bg-white
          border
          border-black/5
          rounded-3xl
          p-6
          sticky
          top-24
        "
      >

        <h2
          class="
            text-xl
            font-semibold
            mb-6
          "
        >
          Payment Summary
        </h2>



        <!-- PRICE -->
        <div class="space-y-4">

          <!-- SUBTOTAL -->
          <div
            class="
              flex
              items-center
              justify-between
              text-sm
            "
          >

            <span class="text-black/55">
              Subtotal
            </span>

            <span id="subtotalPrice">
              --
            </span>

          </div>



          <!-- SHIPPING -->
          <div
            class="
              flex
              items-center
              justify-between
              text-sm
            "
          >

            <span class="text-black/55">
              Shipping
            </span>

            <span id="shippingPrice">
              Free
            </span>

          </div>



          <!-- DIVIDER -->
          <div class="border-t border-black/10"></div>



          <!-- TOTAL -->
          <div
            class="
              flex
              items-center
              justify-between
            "
          >

            <span
              class="
                text-base
                font-semibold
              "
            >
              Total
            </span>

            <span
              id="totalPrice"
              class="
                text-xl
                font-bold
              "
            >
              --
            </span>

          </div>

        </div>



        <!-- PAYMENT -->
        <div
          class="
            mt-8
            rounded-2xl
            bg-[#FAFAFA]
            p-4
          "
        >

          <p
            class="
              text-xs
              uppercase
              tracking-wide
              text-black/40
              mb-2
            "
          >
            Payment Method
          </p>

          <p
            id="paymentMethod"
            class="
              text-sm
              font-medium
            "
          >
            --
          </p>

        </div>

      </section>

    </div>

  </div>

</main>



<script
  type="module"
  src="/front/src/js/pages/orderDetailsPage.js"
></script>

</body>
</html>
