<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="../src/css/main.css" rel="stylesheet" />
    <link rel="stylesheet" href="../src/css/animations.css" />
  </head>

  <body>
    <header
      class="sticky top-0 z-40 bg-white border-b border-black/5 backdrop-blur"
    >
      <div
        class="max-w-6xl mx-auto h-16 px-4 flex items-center justify-between"
      >
        <!-- LEFT -->
        <div class="flex items-center gap-6">
          <!-- LOGO -->
          <a href="../index.html" class="flex items-center shrink-0">
            <img
              src="../src/assets/icon/logo.png"
              alt="Logo"
              class="h-10 w-auto object-contain"
            />
          </a>

          <!-- CONTINUE SHOPPING -->
          <a
            href="../index.html"
            class="hidden sm:flex items-center gap-2 text-sm text-black/90 hover:text-[#6B1A2A] transition"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.8"
              stroke="currentColor"
              class="w-4 h-4"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"
              />
            </svg>

            <span>Continue Shopping</span>
          </a>
        </div>

        <!-- RIGHT -->
        <div class="flex items-center gap-5">

          <!-- WISHLIST -->

          <a
            href="./wishlist.html"
            class="flex items-center gap-2 text-sm text-black/60 hover:text-[#6B1A2A] transition"
          >
            <div class="relative">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="w-8 h-8 text-[#6B1A2A]"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M21 8.25c0-2.485-2.239-4.5-5-4.5-1.74 0-3.27.86-4 2.09-.73-1.23-2.26-2.09-4-2.09-2.761 0-5 2.015-5 4.5 0 6 9 11.25 9 11.25s9-5.25 9-11.25Z"
                />
              </svg>

              <span
                id="wishlistCount"
                class="absolute -top-1 -right-1 text-[10px] px-1.5 py-0.5 rounded-full bg-[#6B1A2A] text-white hidden"
              >
                0
              </span>
            </div>

            <span>Wishlist</span>
          </a>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-10">
      <div class="mb-8">
        <h1 class="text-2xl md:text-3xl font-semibold">Checkout</h1>
      </div>

      <section class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- LEFT -->
        <div class="lg:col-span-2 space-y-6">
          <!-- ADDRESS -->
          <div class="bg-white border border-black/5 rounded-2xl p-5 shadow-sm">
            <div class="flex items-center justify-between mb-5">
              <h2 class="text-lg font-semibold">Select Delivery Address</h2>

              <button
                id="addAddressBtn"
                class="text-sm text-[#6B1A2A] font-medium"
              >
                + Add New Address
              </button>
            </div>

            <div id="addressContainer" class="space-y-4"></div>
          </div>

          <!-- PAYMENT -->
          <div class="bg-white border border-black/5 rounded-2xl p-5 shadow-sm">
            <h2 class="text-lg font-semibold mb-5">Payment Method</h2>

            <div id="paymentMethods" class="space-y-3">
              <!-- COD -->
              <label
                class="flex items-center justify-between border rounded-xl px-4 py-4 cursor-pointer hover:border-[#6B1A2A] transition"
              >
                <div class="flex items-center gap-3">
                  <input type="radio" name="payment" value="COD" checked />

                  <div>
                    <p class="font-medium">Cash on Delivery</p>

                    <p class="text-xs text-black/50">
                      Pay when your order arrives
                    </p>
                  </div>
                </div>
              </label>

           <label
  class="flex items-center justify-between border rounded-xl px-4 py-4 cursor-pointer hover:border-[#6B1A2A] transition"
>
  <div class="flex items-center gap-3">

    <input
      type="radio"
      name="payment"
      value="RAZORPAY"
    />

    <div>
      <p class="font-medium">
        Razorpay
      </p>

      <p class="text-xs text-black/50">
        UPI, Cards, NetBanking & Wallets
      </p>
    </div>

  </div>
</label>
            </div>
          </div>
        </div>

        <!-- RIGHT -->
        <div class="lg:col-span-1">
          <div
            class="sticky top-24 bg-white border border-black/5 rounded-2xl p-5 shadow-sm"
          >
            <h2 class="text-[1.35rem] font-semibold mb-5">Order Summary</h2>

            <div id="summaryContent"></div>

            <button
              id="placeOrderBtn"
              class="w-full h-12 rounded-xl bg-[#6B1A2A] text-white font-medium hover:opacity-90 transition mt-5"
            >
              Place Order
            </button>
          </div>
        </div>
      </section>

      <div
        id="addressModal"
        class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4"
      >
        <div class="bg-white w-full max-w-lg rounded-2xl p-6 overflow-y-auto">


 <div class="flex items-center justify-between mb-5">

    <h2
      id="addressModalTitle"
      class="text-xl font-semibold"
    >
      Add Address
    </h2>

    <button
      id="closeAddressModal"
      type="button"
      class="
        w-9
        h-9
        rounded-full
        flex
        items-center
        justify-center
        text-xl
        text-black/50
        hover:bg-black/5
        transition
      "
    >
      ×
    </button>

  </div>

<form id="addressForm" class="space-y-4">

  <input
    type="hidden"
    id="addressId"
  />

  <!-- Full Name -->
  <div>
    <label class="block text-sm font-medium mb-1">
      Full Name <span class="text-red-500">*</span>
    </label>

    <input
      id="fullName"
      placeholder="Enter full name"
      class="w-full border rounded-xl px-4 h-11"
      required
    />
  </div>

  <!-- Phone + Email -->
  <div class="grid grid-cols-2 gap-4">

    <div>
      <label class="block text-sm font-medium mb-1">
        Phone Number <span class="text-red-500">*</span>
      </label>

      <input
        id="phone"
        type="tel"
        inputmode="numeric"
        maxlength="10"
        placeholder="Phone number"
        class="w-full border rounded-xl px-4 h-11"
        required
      />
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">
        Email
        <span class="text-black/50 font-normal">
          (Optional)
        </span>
      </label>

      <input
        id="email"
        type="email"
        placeholder="your@email.com"
        class="w-full border rounded-xl px-4 h-11"
      />
    </div>

  </div>

  <!-- Pincode + City -->
  <div class="grid grid-cols-2 gap-4">

    <div>
      <label class="block text-sm font-medium mb-1">
        Pincode <span class="text-red-500">*</span>
      </label>

      <input
        id="pincode"
        inputmode="numeric"
        maxlength="6"
        placeholder="Pincode"
        class="w-full border rounded-xl px-4 h-11"
        required
      />
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">
        City <span class="text-red-500">*</span>
      </label>

      <input
        id="city"
        placeholder="City"
        class="w-full border rounded-xl px-4 h-11"
        required
      />
    </div>

  </div>

  <!-- State + Address Type -->
  <div class="grid grid-cols-2 gap-4">

    <div>
      <label class="block text-sm font-medium mb-1">
        State <span class="text-red-500">*</span>
      </label>

      <input
        id="state"
        placeholder="State"
        class="w-full border rounded-xl px-4 h-11"
        required
      />
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">
        Address Type
      </label>

      <select
        id="addressType"
        class="w-full border rounded-xl px-4 h-11"
      >
        <option value="HOME">Home</option>
        <option value="WORK">Work</option>
        <option value="OTHER">Other</option>
      </select>
    </div>

  </div>

  <!-- Address Line 1 -->
  <div>
    <label class="block text-sm font-medium mb-1">
      House / Flat / Building
      <span class="text-red-500">*</span>
    </label>

    <input
      id="addressLine1"
      placeholder="House / Flat / Building"
      class="w-full border rounded-xl px-4 h-11"
      required
    />
  </div>

  <!-- Address Line 2 + Landmark -->
  <div class="grid grid-cols-2 gap-4">

    <div>
      <label class="block text-sm font-medium mb-1">
        Address Line 2
        <span class="text-black/50 font-normal">
          (Optional)
        </span>
      </label>

      <input
        id="addressLine2"
        placeholder="Road / Area"
        class="w-full border rounded-xl px-4 h-11"
      />
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">
        Landmark
        <span class="text-black/50 font-normal">
          (Optional)
        </span>
      </label>

      <input
        id="landmark"
        placeholder="Landmark"
        class="w-full border rounded-xl px-4 h-11"
      />
    </div>

  </div>

  <button
    type="submit"
    class="w-full h-12 rounded-xl bg-[#6B1A2A] text-white font-medium hover:opacity-90 transition"
  >
    Save Address
  </button>

</form>

        </div>
      </div>

      <div
        id="toast"
        class="hidden fixed bottom-5 right-5 bg-black text-white px-4 py-2 rounded-lg shadow-lg z-50"
      ></div>
    </main>


    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script type="module">
      import "../src/js/pages/checkoutPage.js";
    </script>
  </body>
</html>
