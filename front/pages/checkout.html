<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="/front/src/css/main.css" rel="stylesheet" />
    <link rel="stylesheet" href="/front/src/css/animations.css" />
  </head>

  <body>

 <header class="sticky top-0 z-40 bg-white border-b border-black/5 backdrop-blur">

  <div class="max-w-6xl mx-auto h-16 px-4 flex items-center justify-between">

    <!-- LEFT -->
    <div class="flex items-center gap-6">

      <!-- LOGO -->
      <a
        href="/front/index.html"
        class="flex items-center shrink-0"
      >
        <img
          src="/front/src/assets/icon/logo.png"
          alt="Logo"
          class="h-10 w-auto object-contain"
        />
      </a>

      <!-- CONTINUE SHOPPING -->
      <a
        href="/front/index.html"
        class="hidden sm:flex items-center gap-2 text-sm text-black/90 hover:text-[#6B1A2A] transition"
      >

        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.8"
          stroke="currentColor"
          class="w-4 h-4"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"
          />
        </svg>

        <span>Continue Shopping</span>

      </a>

    </div>

    <!-- RIGHT -->
    <div class="flex items-center gap-5">

      <!-- WISHLIST -->
      <a
        href="/front/pages/wishlist.html"
        class="flex items-center gap-2 text-sm text-black/60 hover:text-[#6B1A2A] transition"
      >

        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.8"
          stroke="currentColor"
          class="w-6 h-6"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M21 8.25c0-2.485-2.015-4.5-4.5-4.5-1.74 0-3.247.99-4 2.437-.753-1.446-2.26-2.437-4-2.437-2.485 0-4.5 2.015-4.5 4.5 0 7.22 8.5 12 8.5 12s8.5-4.78 8.5-12z"
          />
        </svg>

        <span class="hidden sm:inline">
          Wishlist
        </span>

      </a>

    </div>

  </div>

</header>


<main class="max-w-6xl mx-auto px-4 py-10">

  <div class="mb-8">
    <h1 class="text-2xl md:text-3xl font-semibold">
      Checkout
    </h1>
  </div>

  <section class="grid grid-cols-1 lg:grid-cols-3 gap-6">

    <!-- LEFT -->
    <div class="lg:col-span-2 space-y-6">

      <!-- ADDRESS -->
      <div
        class="bg-white border border-black/5 rounded-2xl p-5 shadow-sm"
      >

        <div class="flex items-center justify-between mb-5">

          <h2 class="text-lg font-semibold">
            Select Delivery Address
          </h2>

          <button
            id="openAddressModal"
            class="text-sm text-[#6B1A2A] font-medium"
          >
            + Add New Address
          </button>

        </div>

        <div
          id="addressContainer"
          class="space-y-4"
        ></div>

      </div>

      <!-- PAYMENT -->
      <div
        class="bg-white border border-black/5 rounded-2xl p-5 shadow-sm"
      >

        <h2 class="text-lg font-semibold mb-5">
          Payment Method
        </h2>

        <div
          id="paymentMethods"
          class="space-y-3"
        >

          <!-- COD -->
          <label
            class="flex items-center justify-between border rounded-xl px-4 py-4 cursor-pointer hover:border-[#6B1A2A] transition"
          >

            <div class="flex items-center gap-3">

              <input
                type="radio"
                name="payment"
                value="COD"
                checked
              />

              <div>

                <p class="font-medium">
                  Cash on Delivery
                </p>

                <p class="text-xs text-black/50">
                  Pay when your order arrives
                </p>

              </div>

            </div>

          </label>

          <!-- RAZORPAY -->
          <label
            class="flex items-center justify-between border rounded-xl px-4 py-4 opacity-50 cursor-not-allowed"
          >

            <div class="flex items-center gap-3">

              <input
                type="radio"
                disabled
              />

              <div>

                <p class="font-medium">
                  Razorpay
                </p>

                <p class="text-xs text-black/50">
                  Coming soon
                </p>

              </div>

            </div>

          </label>

        </div>

      </div>

    </div>

    <!-- RIGHT -->
    <div class="lg:col-span-1">

      <div
        class="sticky top-24 bg-white border border-black/5 rounded-2xl p-5 shadow-sm"
      >

        <h2 class="text-[1.35rem] font-semibold mb-5">
          Order Summary
        </h2>

        <div id="summaryContent"></div>

        <button
          id="placeOrderBtn"
          class="w-full h-12 rounded-xl bg-[#6B1A2A] text-white font-medium hover:opacity-90 transition mt-5"
        >
          Place Order
        </button>

      </div>

    </div>

  </section>




  <div
  id="addressModal"
  class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4"
>

  <div
    class="bg-white w-full max-w-lg rounded-2xl p-6"
  >

    <div class="flex items-center justify-between mb-5">

      <h2  class="text-xl font-semibold">
        Add Address
      </h2>

      <button
        id="closeAddressModal"
        class="text-black/50 text-xl"
      >
        ×
      </button>

    </div>

    <form
      id="addressForm"
      class="space-y-4"
    >

      <input
        name="fullName"
        placeholder="Full Name"
        class="w-full border rounded-xl px-4 h-11"
        required
      />

      <input
        name="phone"
        placeholder="Phone Number"
        class="w-full border rounded-xl px-4 h-11"
        required
      />

      <input
        name="pincode"
        placeholder="Pincode"
        class="w-full border rounded-xl px-4 h-11"
        required
      />

      <input
        name="city"
        placeholder="City"
        class="w-full border rounded-xl px-4 h-11"
        required
      />

      <input
        name="state"
        placeholder="State"
        class="w-full border rounded-xl px-4 h-11"
        required
      />

      <input
        name="addressLine1"
        placeholder="House / Flat / Building"
        class="w-full border rounded-xl px-4 h-11"
        required
      />

      <input
        name="addressLine2"
        placeholder="Road / Area / Colony"
        class="w-full border rounded-xl px-4 h-11"
      />

      <select
        name="addressType"
        class="w-full border rounded-xl px-4 h-11"
      >

        <option value="HOME">
          Home
        </option>

        <option value="WORK">
          Work
        </option>

        <option value="OTHER">
          Other
        </option>

      </select>

      <button
        type="submit"
        class="w-full h-12 rounded-xl bg-[#6B1A2A] text-white font-medium"
      >
        Save Address
      </button>

    </form>

  </div>

</div>



<div
  id="toast"
  class="hidden fixed bottom-5 right-5 bg-black text-white px-4 py-2 rounded-lg shadow-lg z-50">
</div>

</main>


<script type="module">

  import "/front/src/js/pages/checkoutPage.js";

</script>

  </body>
</html>
