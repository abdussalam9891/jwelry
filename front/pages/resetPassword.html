<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>Reset Password - Gemora</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body
  class="min-h-screen bg-[#FDF6EC] flex items-center justify-center px-4"
>
  <!-- CARD -->
  <div
    class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-[#EADBC8] p-8"
  >
    <!-- Logo / Heading -->
    <div class="text-center">
      <h1
        class="text-2xl font-semibold text-[#6B1A2A]"
      >
        Reset Password
      </h1>

      <p
        class="text-sm text-gray-500 mt-2"
      >
        Create a new password for your
        Gemora account
      </p>
    </div>

    <!-- FORM -->
    <form
      id="resetPasswordForm"
      class="mt-8 space-y-5"
    >
      <!-- New Password -->
      <div>
        <label
          class="block text-sm font-medium text-gray-700 mb-2"
        >
          New Password
        </label>

        <input
          id="newPassword"
          type="password"
          placeholder="Enter new password"
          class="
            w-full
            rounded-xl
            border
            border-gray-200
            px-4
            py-3
            text-sm
            outline-none
            focus:ring-2
            focus:ring-[#6B1A2A]/20
          "
        />
      </div>

      <!-- Confirm Password -->
      <div>
        <label
          class="block text-sm font-medium text-gray-700 mb-2"
        >
          Confirm Password
        </label>

        <input
          id="confirmPassword"
          type="password"
          placeholder="Confirm password"
          class="
            w-full
            rounded-xl
            border
            border-gray-200
            px-4
            py-3
            text-sm
            outline-none
            focus:ring-2
            focus:ring-[#6B1A2A]/20
          "
        />
      </div>

      <!-- Button -->
      <button
        id="resetPasswordBtn"
        type="submit"
        class="
          w-full
          bg-[#6B1A2A]
          text-white
          py-3
          rounded-xl
          font-medium
          shadow-md
          hover:bg-[#531321]
          transition
        "
      >
        Reset Password
      </button>
    </form>

    <!-- Back -->
    <div class="mt-6 text-center">
      <a
        href="/"
        class="
          text-sm
          text-[#6B1A2A]
          hover:underline
        "
      >
        Back to Login
      </a>
    </div>
  </div>

  <!-- GLOBAL TOAST -->
  <div
    id="toast"
    class="
      hidden
      fixed
      bottom-5
      right-5
      bg-black
      text-white
      px-4
      py-2
      rounded-lg
      shadow-lg
      z-[10001]
    "
  ></div>

  <!-- JS -->
  <script
    type="module"
    src="/front/src/js/pages/resetPassword.js"
  ></script>
</body>
</html>
